<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" width="100%" height="100%">
  <defs>
    <style>
      .terminal-bg { fill: #0d1117; rx: 8px; }
      .window-header { fill: #161b22; }
      .dot-red { fill: #ff5f56; }
      .dot-yellow { fill: #ffbd2e; }
      .dot-green { fill: #27c93f; }
      .text-base { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 13px; fill: #c9d1d9; }
      .prompt { fill: #58a6ff; font-weight: bold; }
      .cmd { fill: #f0f6fc; }
      .accent { fill: #79c0ff; }
      .success { fill: #56d364; }
      .dim { fill: #8b949e; }
      .line { opacity: 0; animation: fadeIn 0.1s forwards; }
      .cursor { animation: blink 0.8s infinite; fill: #c9d1d9; }
      @keyframes fadeIn { to { opacity: 1; } }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      .l1 { animation-delay: 0.5s; }
      .l2 { animation-delay: 1.5s; }
      .l3 { animation-delay: 2.2s; }
      .l4 { animation-delay: 3.2s; }
      .l5 { animation-delay: 3.5s; }
      .l6 { animation-delay: 4.5s; }
      .l7 { animation-delay: 5.2s; }
      .cur-pos1 { animation: moveCursor1 5.5s infinite; }
      @keyframes moveCursor1 {
        0%, 9% { transform: translate(0px, 0px); opacity: 1; }
        10%, 27% { transform: translate(0px, 22px); opacity: 0; }
        28%, 100% { transform: translate(0px, 140px); opacity: 1; }
      }
    </style>
  </defs>
  <rect class="terminal-bg" width="700" height="320" />
  <path class="window-header" d="M0,8 Q0,0 8,0 L692,0 Q700,0 700,8 L700,30 L0,30 Z" />
  <circle class="dot-red" cx="20" cy="15" r="6" />
  <circle class="dot-yellow" cx="40" cy="15" r="6" />
  <circle class="dot-green" cx="60" cy="15" r="6" />
  <text class="text-base dim" x="350" cy="20" text-anchor="middle" font-size="11">bash — python scanner.py</text>
  <g transform="translate(25, 45)">
    <g class="line l1"><text class="text-base prompt" x="0" y="20">$ <tspan class="cmd">python scanner.py</tspan></text></g>
    <g class="line l2"><text class="text-base accent" x="0" y="42">Scanning for BLE devices... Press Ctrl+C to stop.</text></g>
    <g class="line l3"><text class="text-base" x="0" y="70"><tspan class="success">[🥇 AA:BB:CC:DD:EE:FF]</tspan><tspan> - RSSI: </tspan><tspan class="accent">-64 dBm</tspan><tspan> | Name: </tspan><tspan class="cmd" font-weight="bold">Smart_Watch</tspan></text></g>
    <g class="line l4"><text class="text-base dim" x="20" y="88">└── Services: ['0000180d-0000-1000-8000-00805f9b34fb']</text></g>
    <g class="line l5"><text class="text-base" x="0" y="115"><tspan class="success">[🥈 11:22:33:44:55:66]</tspan><tspan> - RSSI: </tspan><tspan class="accent">-88 dBm</tspan><tspan> | Name: </tspan><tspan class="dim">Unknown Device</tspan></text></g>
    <g class="line l6"><text class="text-base" x="0" y="142"><tspan class="success">[🥉 99:88:77:66:55:44]</tspan><tspan> - RSSI: </tspan><tspan class="accent">-72 dBm</tspan><tspan> | Name: </tspan><tspan class="cmd" font-weight="bold">LE_HomeThermostat</tspan></text></g>
    <g class="line l7">
      <text class="text-base dim" x="0" y="170">------------------------------------------------------------</text>
      <text class="text-base prompt" x="0" y="192">^C</text>
      <text class="text-base dim" x="25" y="192">Scan stopped by user.</text>
      <text class="text-base prompt" x="0" y="220">$ </text>
    </g>
    <rect class="cursor cur-pos1" x="165" y="6" width="8" height="15" />
  </g>
</svg>

